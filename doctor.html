<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        h1 { text-align: center; color: #333; }
        .stats { display: flex; justify-content: space-between; margin: 15px 0; padding: 10px; background: #e9ecef; border-radius: 8px; }
        .question-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .question-text { font-weight: bold; margin-bottom: 10px; }
        .required { color: red; font-size: 12px; }
        .options { margin-left: 20px; }
        .option { margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        input[type="radio"] { cursor: pointer; }
        .feedback { margin-top: 10px; padding: 8px; border-radius: 5px; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #d4edda; color: #155724; }
        .feedback.incorrect { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .submit-btn { background: #28a745; color: white; }
        .reset-btn { background: #6c757d; color: white; }
        .result-area { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; text-align: center; display: none; }
        .result-area.show { display: block; }
        .score-number { font-size: 32px; font-weight: bold; color: #28a745; }
        .error-msg { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; text-align: center; }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
<div class="quiz-container">
    <h1>📋 Quick Quiz</h1>
    
    <div class="stats">
        <div>Total: <span id="totalQuestions">0</span></div>
        <div>Answered: <span id="answeredCount">0</span></div>
        <div>Status: <span id="status">Not submitted</span></div>
    </div>
    
    <div id="errorMsg" class="error-msg">⚠️ Please answer all questions!</div>
    <div id="questionsContainer"></div>
    
    <div style="margin-top: 20px;">
        <button class="submit-btn" id="submitBtn">Submit Quiz</button>
        <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
    
    <div id="resultArea" class="result-area"></div>
</div>

<script>
    const quizData = [
        { question: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Layout", "Hyper Transfer Markup Language", "Home Tool Markup Language"], correct: 0 },
        { question: "Which JavaScript method selects an element by ID?", options: ["querySelector()", "getElementById()", "getElementsByClassName()", "selectId()"], correct: 1 },
        { question: "What does CSS stand for?", options: ["Creative Style Sheets", "Computer Style Sheets", "Cascading Style Sheets", "Colorful Style Sheets"], correct: 2 },
        { question: "Correct way to write a JavaScript array?", options: ["var colors = 'red', 'green'", "var colors = (1:'red')", "var colors = ['red', 'green']", "var colors = {red, green}"], correct: 2 },
        { question: "What does DOM stand for?", options: ["Document Object Model", "Data Object Management", "Display Orientation Module", "Document Oriented Model"], correct: 0 }
    ];
    
    let userAnswers = new Array(quizData.length).fill(-1);
    let isSubmitted = false;
    
    const questionsDiv = document.getElementById('questionsContainer');
    const totalSpan = document.getElementById('totalQuestions');
    const answeredSpan = document.getElementById('answeredCount');
    const statusSpan = document.getElementById('status');
    const errorMsg = document.getElementById('errorMsg');
    const resultArea = document.getElementById('resultArea');
    
    function updateStats() {
        let answered = userAnswers.filter(a => a !== -1).length;
        totalSpan.textContent = quizData.length;
        answeredSpan.textContent = answered;
        if (!isSubmitted) {
            statusSpan.textContent = answered === quizData.length ? "Ready" : "In progress";
        } else {
            statusSpan.textContent = "Completed";
        }
    }
    
    function hideError() { errorMsg.classList.remove('show'); }
    function showError() { errorMsg.classList.add('show'); setTimeout(() => errorMsg.classList.remove('show'), 3000); }
    
    function renderQuestions() {
        questionsDiv.innerHTML = '';
        quizData.forEach((q, idx) => {
            let card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${idx+1}. ${q.question} <span class="required">*</span></div><div class="options" id="opts-${idx}"></div><div class="feedback" id="fb-${idx}"></div>`;
            questionsDiv.appendChild(card);
            
            let optsDiv = document.getElementById(`opts-${idx}`);
            q.options.forEach((opt, optIdx) => {
                let wrapper = document.createElement('div');
                wrapper.className = 'option';
                let radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = optIdx;
                radio.disabled = isSubmitted;
                if (userAnswers[idx] === optIdx && !isSubmitted) radio.checked = true;
                radio.onchange = (function(i, oi) {
                    return function() { if (!isSubmitted && this.checked) { userAnswers[i] = oi; updateStats(); hideError(); document.getElementById(`fb-${i}`).classList.remove('show'); } };
                })(idx, optIdx);
                let label = document.createElement('label');
                label.textContent = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                wrapper.appendChild(radio);
                wrapper.appendChild(label);
                optsDiv.appendChild(wrapper);
            });
        });
        updateStats();
    }
    
    function calculateAndDisplayResults() {
        let score = 0;
        quizData.forEach((q, i) => {
            let isCorrect = (userAnswers[i] === q.correct);
            if (isCorrect) score++;
            let fb = document.getElementById(`fb-${i}`);
            if (isCorrect) {
                fb.innerHTML = '✅ Correct!';
                fb.className = 'feedback correct show';
            } else {
                let correctText = q.options[q.correct];
                let userText = userAnswers[i] !== -1 ? q.options[userAnswers[i]] : "No answer";
                fb.innerHTML = `❌ Incorrect! Correct: "${correctText}"`;
                fb.className = 'feedback incorrect show';
            }
        });
        let percentage = Math.round((score / quizData.length) * 100);
        let msg = score === quizData.length ? 'Perfect!' : score >= 3 ? 'Good job!' : 'Try again!';
        resultArea.innerHTML = `<div class="score-number">${score} / ${quizData.length}</div><div>${msg} (${percentage}%)</div>`;
        resultArea.classList.add('show');
        isSubmitted = true;
        updateStats();
        document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
    }
    
    function handleSubmit() {
        if (isSubmitted) { alert('Already submitted! Click Reset.'); return; }
        if (userAnswers.some(a => a === -1)) {
            showError();
            let first = userAnswers.findIndex(a => a === -1);
            let cards = document.querySelectorAll('.question-card');
            if (cards[first]) cards[first].scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        hideError();
        calculateAndDisplayResults();
    }
    
    function handleReset() {
        userAnswers = new Array(quizData.length).fill(-1);
        isSubmitted = false;
        resultArea.innerHTML = '';
        resultArea.classList.remove('show');
        hideError();
        renderQuestions();
        updateStats();
    }
    
    renderQuestions();
    document.getElementById('submitBtn').onclick = handleSubmit;
    document.getElementById('resetBtn').onclick = handleReset;
</script>
</body>
</html>
